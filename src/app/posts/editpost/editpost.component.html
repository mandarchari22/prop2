<div class="row">
    <div class="col-md-12">
        <form [formGroup]="postForm">
            <h3>Update Post</h3>
            <hr/>
             <form [formGroup]="postForm" (submit)="onSubmit()">
            <div class="mb-3">
                <label>Title</label>
                <input type="text" class="form-control" formControlName="title" />
                <div *ngIf="postForm.get('title')?.touched && !postForm.get('title')?.valid">
                    <div *ngIf="postForm.get('title')?.errors?.['required']">
                        Title is required
                    </div>
                    <div *ngIf="postForm.get('title')?.errors?.['minlength']">
                        Title should be min 6 letter is required
                    </div>
                </div>
            </div>
          
            <div class="mb-3">
                <label>Description</label>
                <textarea class="form-control" formControlName="Description" ></textarea>
                 <div *ngIf="postForm.get('Description')?.touched && !postForm.get('Description')?.valid">
                    <div *ngIf="postForm.get('Description')?.errors?.['required']">
                        Description is required
                    </div>
                    <div *ngIf="postForm.get('Description')?.errors?.['minlength']">
                        Descriptionshould be min 6 letter is required
                    </div>
                </div>
            </div>
            <div class="my-3">
                <button type="submit" class="btn btn-primary" >Update Post</button>
            </div>
        </form>
        </form>   
    </div>
</div>
