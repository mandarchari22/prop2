<div class="row">
    <div class="col-md-8">
        <h3>Posts List</h3>
        <div>
            <a class="btn btn-primary" [routerLink]="['/posts/add']">
                Add Post
            </a>
        </div>
        <table class="table table-striped" *ngIf="posts | async as postsData">
            <thead>
                <tr>
                    <th>ID </th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let post of postsData">
                    <td>{{ post.id }}  </td>
                    <td>{{ post.title }}</td>
                    <td>{{ post.Description }}</td>
                    <td>
                        <a href="" class="btn btn-primary" [routerLink]="['/posts/edit',post.id]">Update</a>&nbsp;

                        <a class="btn btn-danger"  (click)="onDeletePost(post.id)">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="col-md-4">
        <router-outlet></router-outlet>

    </div>
</div>
